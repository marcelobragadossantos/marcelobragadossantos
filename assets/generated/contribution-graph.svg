    · avg/wk: <tspan fill="#00d4ff">1</tspan>
    · last 28d: <tspan fill="#00d4ff">11</tspan>
  </text>

  <!-- Baseline -->
  <line x1="60" y1="175" x2="820" y2="175"
        stroke="#1a2332" stroke-width="1"/>

  <!-- Grid -->
    <line x1="60" y1="145.0" x2="820" y2="145.0" stroke="#1a2332" stroke-width="0.5" opacity="0.6"/>
    <text x="52" y="148.0" fill="#64748b" font-size="9" font-family="monospace" text-anchor="end">2</text>
    <line x1="60" y1="115.0" x2="820" y2="115.0" stroke="#1a2332" stroke-width="0.5" opacity="0.6"/>
    <text x="52" y="118.0" fill="#64748b" font-size="9" font-family="monospace" text-anchor="end">4</text>
    <line x1="60" y1="85.0" x2="820" y2="85.0" stroke="#1a2332" stroke-width="0.5" opacity="0.6"/>
    <text x="52" y="88.0" fill="#64748b" font-size="9" font-family="monospace" text-anchor="end">6</text>
    <line x1="60" y1="55.0" x2="820" y2="55.0" stroke="#1a2332" stroke-width="0.5" opacity="0.6"/>
    <text x="52" y="58.0" fill="#64748b" font-size="9" font-family="monospace" text-anchor="end">8</text>

  <!-- Month labels -->
    <text x="60.0" y="191" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">Apr</text>
    <text x="119.6" y="191" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">May</text>
    <text x="179.2" y="191" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">Jun</text>
    <text x="238.8" y="191" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">Jul</text>
    <text x="298.4" y="191" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">Aug</text>
    <text x="358.0" y="191" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">Sep</text>
