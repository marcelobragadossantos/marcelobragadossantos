  <polygon points="60.0,175.0 60.0,175.0 74.9,175.0 89.8,175.0 104.7,175.0 119.6,100.0 134.5,175.0 149.4,175.0 164.3,175.0 179.2,175.0 194.1,175.0 209.0,175.0 223.9,175.0 238.8,175.0 253.7,175.0 268.6,175.0 283.5,175.0 298.4,175.0 313.3,175.0 328.2,175.0 343.1,175.0 358.0,175.0 372.9,175.0 387.8,175.0 402.7,175.0 417.6,175.0 432.5,175.0 447.5,175.0 462.4,175.0 477.3,175.0 492.2,115.0 507.1,175.0 522.0,175.0 536.9,175.0 551.8,175.0 566.7,175.0 581.6,175.0 596.5,175.0 611.4,175.0 626.3,175.0 641.2,175.0 656.1,175.0 671.0,175.0 685.9,55.0 700.8,175.0 715.7,175.0 730.6,175.0 745.5,175.0 760.4,145.0 775.3,145.0 790.2,115.0 805.1,100.0 820.0,175.0 820.0,175.0" fill="url(#area-grad)"/>

