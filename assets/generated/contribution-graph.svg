<svg xmlns="http://www.w3.org/2000/svg" width="850" height="220" viewBox="0 0 850 220">
  <defs>
    <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow-graph" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="0.5" y="0.5" width="849" height="219" rx="12" ry="12"
        fill="#0f1623" stroke="#1a2332" stroke-width="1"/>

  <!-- Title -->
  <text x="30" y="32" fill="#64748b" font-size="11" font-family="monospace" letter-spacing="3">CONTRIBUTION FLIGHT PATH</text>

  <!-- Summary badges -->
  <text x="820" y="32" fill="#94a3b8" font-size="10" font-family="monospace" text-anchor="end">
